# Sensor-upload location block. Patch into the running LiveORC nginx by
# adding inside the main `server { ... }` block of /liveorc/nginx/nginx-ssl.conf
# AND its `.template` (the running config is regenerated from the template
# at container startup).
#
# The upstream `orc-sensor-upload:8001` resolves via Docker DNS because both
# containers are on the `liveorc_default` network (see ../docker-compose.yml).
#
# KNOWN TRAP: the nginx-ssl.conf.template lives inside the LiveORC container
# image. A `liveorc.sh rebuild` will reset it. Until LiveORC's template
# supports drop-in includes (filed upstream), this patch must be re-applied
# after any LiveORC rebuild. The apply procedure is in ../README.md.

location /sensors/ {
    client_max_body_size 50M;
    proxy_pass http://orc-sensor-upload:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
}
