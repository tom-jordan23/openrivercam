# LiveORC server-side additions: services that run alongside LiveORC on the
# same EC2 host but DO NOT modify LiveORC's container or config.
#
# Stack:
#   sensor-upload    HTTPS PUT endpoint :8443 (ingests from Pi stations)
#   timescale        TimescaleDB; backing store for sensor time series
#   sensor-ingest    Polls /var/orc/sensors/*.csv → upserts into timescale
#   grafana          UI at :9443 (anonymous viewer; admin login for editing)
#
# Self-signed cert (10-year) at ./certs/{fullchain,privkey}.pem is shared
# by sensor-upload and grafana. Public cert is in the repo at
# pi/shared/etc/orc/sensor-upload-ca.pem for station-side pinning.
#
# Deploy with:
#   docker compose --env-file .env up -d --build
#
# Requires .env with:
#   ORC_UPLOAD_TOKENS=...
#   TIMESCALE_PASSWORD=...
#   GRAFANA_ADMIN_PASSWORD=...

services:
  sensor-upload:
    build: ./sensor-upload
    container_name: orc-sensor-upload
    restart: unless-stopped
    environment:
      ORC_SENSORS_DIR: /var/orc/sensors
      ORC_UPLOAD_TOKENS: ${ORC_UPLOAD_TOKENS:?ORC_UPLOAD_TOKENS must be set in .env}
    ports:
      - "8443:8443"
    volumes:
      - /var/orc/sensors:/var/orc/sensors:rw
      - ./certs:/certs:ro

  timescale:
    image: timescale/timescaledb-ha:pg16
    container_name: orc-timescale
    restart: unless-stopped
    environment:
      POSTGRES_DB: orc
      POSTGRES_USER: orc
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:?TIMESCALE_PASSWORD must be set in .env}
    volumes:
      - timescale_data:/home/postgres/pgdata/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orc -d orc -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5

  sensor-ingest:
    build: ./sensor-ingest
    container_name: orc-sensor-ingest
    restart: unless-stopped
    depends_on:
      timescale:
        condition: service_healthy
    environment:
      DATA_DIR: /data
      PG_DSN: host=timescale port=5432 dbname=orc user=orc password=${TIMESCALE_PASSWORD:?TIMESCALE_PASSWORD must be set in .env}
      POLL_SECS: "30"
    volumes:
      - /var/orc/sensors:/data:ro

  grafana:
    image: grafana/grafana:11.3.0
    container_name: orc-grafana
    restart: unless-stopped
    # Runs as root so it can read the self-signed privkey (mode 0600
    # root:root, written by bootstrap-cert.sh). Same rationale as
    # sensor-upload — container is isolated and surface is narrow.
    user: "0:0"
    depends_on:
      timescale:
        condition: service_healthy
    environment:
      # TLS termination at Grafana (same self-signed cert sensor-upload uses)
      GF_SERVER_PROTOCOL: https
      GF_SERVER_HTTP_PORT: "9443"
      GF_SERVER_CERT_FILE: /certs/fullchain.pem
      GF_SERVER_CERT_KEY: /certs/privkey.pem
      # Anonymous read access (public dashboards). Admin still needs login
      # to edit; that path is at /login.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      # Branding — reinforces the research/non-official framing
      GF_SECURITY_ADMIN_USER: orc-admin
      GF_USERS_DEFAULT_THEME: light
      # Datasource expansion uses env vars (referenced in provisioning yml)
      TIMESCALE_PASSWORD: ${TIMESCALE_PASSWORD}
    ports:
      - "9443:9443"
    volumes:
      - ./certs:/certs:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  timescale_data:
  grafana_data:
