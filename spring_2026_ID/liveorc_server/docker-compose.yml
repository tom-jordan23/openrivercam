# LiveORC server-side additions: services that run alongside LiveORC on the
# same EC2 host but DO NOT modify LiveORC's container or config.
#
# Architecture: sensor-upload terminates TLS directly on port 8443 with its
# OWN self-signed certificate (10-year, generated by the bootstrap step in
# README.md). The public cert is committed to the repo at
# pi/shared/etc/orc/sensor-upload-ca.pem so stations can pin against it.
#
# We do NOT share LiveORC's cert — turns out LiveORC writes its certs to a
# path that isn't on the persistent volume, so the volume is empty and the
# certs regenerate on each LiveORC rebuild. Not a stable source.
#
# Deploy with:
#   docker compose -f docker-compose.yml --env-file .env up -d --build
#
# Requires:
#   .env with ORC_UPLOAD_TOKENS=sukabumi:<token1>,jakarta:<token2>
#   ./certs/{fullchain,privkey}.pem from the bootstrap step

services:
  sensor-upload:
    build: ./sensor-upload
    container_name: orc-sensor-upload
    restart: unless-stopped
    environment:
      ORC_SENSORS_DIR: /var/orc/sensors
      ORC_UPLOAD_TOKENS: ${ORC_UPLOAD_TOKENS:?ORC_UPLOAD_TOKENS must be set in .env}
    ports:
      - "8443:8443"
    volumes:
      - /var/orc/sensors:/var/orc/sensors:rw
      - ./certs:/certs:ro
