# LiveORC server-side additions: services that run alongside LiveORC on the
# same EC2 host but DO NOT modify LiveORC's container or config.
#
# Architecture: sensor-upload terminates TLS directly on port 8443, reusing
# LiveORC's letsencrypt cert by mounting LiveORC's existing docker volume
# read-only. AWS Security Group must allow inbound 8443.
#
# Deploy with:
#   docker compose -f docker-compose.yml --env-file .env up -d --build
#
# Requires `.env` with at minimum:
#   ORC_UPLOAD_TOKENS=sukabumi:<token1>,jakarta:<token2>
#
# LiveORC must already be running because its letsencrypt volume is mounted
# here as an external named volume.

services:
  sensor-upload:
    build: ./sensor-upload
    container_name: orc-sensor-upload
    restart: unless-stopped
    environment:
      ORC_SENSORS_DIR: /var/orc/sensors
      ORC_UPLOAD_TOKENS: ${ORC_UPLOAD_TOKENS:?ORC_UPLOAD_TOKENS must be set in .env}
    ports:
      - "8443:8443"
    volumes:
      - /var/orc/sensors:/var/orc/sensors:rw
      - liveorc_letsencrypt:/certs:ro

# LiveORC's letsencrypt volume — we mount it read-only to reuse the cert.
# When LiveORC's certbot renews (every ~60 days), this container's uvicorn
# needs a restart to pick up the new files (see README → "Cert renewal").
volumes:
  liveorc_letsencrypt:
    external: true
