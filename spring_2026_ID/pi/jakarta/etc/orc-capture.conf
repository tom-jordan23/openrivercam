# orc-capture.conf — configuration for the orc-capture script
#
# This file is sourced by orc-capture on every run. Edit values here
# to change capture behavior without modifying the script itself.
#
# Location: /etc/orc-capture.conf

# ─── Relay mode ────────────────────────────────────────────────────
# "cycle"  = power on relay before capture, power off after
#            (for solar/battery sites where camera power must be conserved)
# "always" = assert relay on at boot, leave on permanently, never power off
#            (for AC-powered sites where camera can stay on)
# Both modes still use the fail-safe NO relay — if the Pi crashes or
# loses power, the relay de-energizes and the camera powers down.
RELAY_MODE=always             # AC power — camera stays on permanently

# ─── Camera connection ──────────────────────────────────────────────
CAMERA_IP=192.168.50.101      # Jakarta camera
CAMERA_USER=admin
# CAMERA_PASS is intentionally omitted — it is loaded from
# ~/.orc_deploy_<site> or the CAMERA_PASS env var. Do not store
# passwords in this file.

# RTSP endpoint (appended to rtsp://<user>:<pass>@<ip>:<port>/)
RTSP_PORT=554
RTSP_PATH=Streaming/Channels/101

# ─── Video capture ──────────────────────────────────────────────────
CAPTURE_DURATION=5              # seconds of video to record
VIDEO_FORMAT=mp4                # output container format
VIDEO_CODEC=copy                # ffmpeg -c:v value (copy = no re-encode)
VIDEO_AUDIO=0                   # 0 = strip audio (-an), 1 = keep audio

# ─── Output ─────────────────────────────────────────────────────────
INCOMING_DIR=/home/pi/Videos    # where delivered videos land (ORC-OS default)
FILENAME_TEMPLATE=%Y%m%dT%H%M%S  # strftime format — matches ORC-OS suggested default
TEMP_DIR=/tmp                   # scratch directory for captures in progress

# ─── Timing ─────────────────────────────────────────────────────────
CAMERA_BOOT_TIMEOUT=90          # max seconds to wait for camera ping
CAMERA_SETTLE_TIME=15           # seconds after first ping before RTSP capture
MAX_RETRIES=3                   # capture attempts on quality gate failure
RETRY_DELAY=5                   # seconds between retries

# ─── Quality gate ──────────────────────────────────────────────────
MIN_BITRATE_KBPS=12000          # minimum bitrate (kbps) — 12 Mbps
EXPECTED_WIDTH=1920             # expected horizontal resolution
EXPECTED_HEIGHT=1080            # expected vertical resolution
MIN_DURATION=4.0                # minimum acceptable duration (seconds)
MAX_DURATION=7.0                # maximum acceptable duration (seconds)
MIN_FRAMES=40                   # minimum frame count (~12.5fps x 4s)

# ─── Camera config enforcement ──────────────────────────────────────
# ISAPI settings re-applied each boot to prevent white-light flashing.
ISAPI_CHANNEL=/ISAPI/Image/channels/1
SUPPLEMENT_LIGHT_MODE=irLight

# ─── Day / night profile switching ──────────────────────────────────
# Times are UTC (system clock is UTC). WIB sunset 18:00 = 11:00 UTC,
# WIB sunrise 06:00 = 23:00 UTC. Window does not wrap midnight UTC.
NIGHT_START=11:00               # 18:00 WIB — night profile takes over
NIGHT_END=23:00                 # 06:00 WIB — day profile resumes
DAY_PROFILE_PATH=/home/pi/camera_profiles/common/image.xml
NIGHT_PROFILE_PATH=/home/pi/camera_profiles/profiles/profile-night/image.xml
CAMERA_NAME=jakarta-cam1        # cameras.json key for camtool push
