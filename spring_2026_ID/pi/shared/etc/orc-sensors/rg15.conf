# rg15.conf — Hydreon RG-15 optical rain gauge configuration
#
# Per-sensor config loaded by orc-sensors on every run.
# The RG-15 is powered continuously from TB1 and accumulates rainfall
# internally while the Pi sleeps. The driver reads TotalAcc (EEPROM-backed
# lifetime total) and reports interval rainfall as the delta since the
# last reading. TotalAcc is used instead of Acc because Acc resets on
# power cycle and on any 'A' command; TotalAcc is persistent.
#
# The driver also forces polling mode ('P') on every read. If the gauge
# is left in continuous ('C') mode it pushes event lines to the UART
# whenever rain is detected, which we would miss while sleeping — data
# loss observed in April 2026.
#
# Location: /etc/orc-sensors/rg15.conf

# ─── Sensor identity ────────────────────────────────────────────────
SENSOR_TYPE=rg15                      # sensor driver (must match a handler)
SENSOR_LABEL=rg15                     # prefix for CSV filenames

# ─── Output ─────────────────────────────────────────────────────────
LOG_DIR=/var/log/orc/sensors          # directory for daily CSV files
LOG_ROTATE_DAYS=30                    # delete CSVs older than this
CSV_HEADER=timestamp,totalacc_mm,interval_mm

# ─── Timing ─────────────────────────────────────────────────────────
INTERVAL_SEC=300                      # seconds between readings

# ─── UART ───────────────────────────────────────────────────────────
SERIAL_PORT=/dev/ttyAMA0              # Pi 5 UART0 (GPIO 14/15)
SERIAL_BAUD=9600                      # RG-15 default baud rate

# ─── State ──────────────────────────────────────────────────────────
STATE_FILE=/var/lib/orc-sensors/rg15_totalacc.txt
