# rg15.conf — Hydreon RG-15 optical rain gauge configuration
#
# Per-sensor config loaded by orc-sensors on every run.
# The RG-15 accumulates rainfall internally while the Pi sleeps.
# Each reading computes interval rainfall (delta since last read).
#
# Location: /etc/orc-sensors/rg15.conf

# ─── Sensor identity ────────────────────────────────────────────────
SENSOR_TYPE=rg15                      # sensor driver (must match a handler)
SENSOR_LABEL=rg15                     # prefix for CSV filenames

# ─── Output ─────────────────────────────────────────────────────────
LOG_DIR=/var/log/orc/sensors          # directory for daily CSV files
LOG_ROTATE_DAYS=30                    # delete CSVs older than this
CSV_HEADER=timestamp,acc_mm,interval_mm

# ─── Timing ─────────────────────────────────────────────────────────
INTERVAL_SEC=300                      # seconds between readings

# ─── UART ───────────────────────────────────────────────────────────
SERIAL_PORT=/dev/ttyAMA0              # Pi 5 UART0 (GPIO 14/15)
SERIAL_BAUD=9600                      # RG-15 default baud rate

# ─── State ──────────────────────────────────────────────────────────
STATE_FILE=/var/lib/orc-sensors/rg15_acc.txt
