# sht40.conf — SHT40 temperature/humidity sensor configuration
#
# Per-sensor config loaded by orc-sensors on every run.
# Each .conf file in /etc/orc-sensors/ defines one sensor.
#
# Location: /etc/orc-sensors/sht40.conf

# ─── Sensor identity ────────────────────────────────────────────────
SENSOR_TYPE=sht40                     # sensor driver (must match a handler)
SENSOR_LABEL=sht40                    # prefix for CSV filenames

# ─── Output ─────────────────────────────────────────────────────────
LOG_DIR=/var/log/orc/sensors          # directory for daily CSV files
LOG_ROTATE_DAYS=30                    # delete CSVs older than this
CSV_HEADER="timestamp,temp_c,humidity_pct"

# ─── Timing ─────────────────────────────────────────────────────────
INTERVAL_SEC=300                      # seconds between readings

# ─── I2C ────────────────────────────────────────────────────────────
I2C_BUS=1                             # /dev/i2c-<N>
I2C_ADDR=0x44                         # SHT40 default address
