# ds18b20.conf — DS18B20 waterproof temperature probe configuration
#
# Per-sensor config loaded by orc-sensors on every run.
# Reads temperature via 1-Wire sysfs interface (kernel driver).
#
# Requires: dtoverlay=w1-gpio in /boot/firmware/config.txt
# Default data pin: GPIO 4 (Pin 7) with 4.7k pull-up to 3V3
#
# Location: /etc/orc-sensors/ds18b20.conf

# ─── Sensor identity ────────────────────────────────────────────────
SENSOR_TYPE=ds18b20                   # sensor driver (must match a handler)
SENSOR_LABEL=ds18b20                  # prefix for CSV filenames

# ─── Output ─────────────────────────────────────────────────────────
LOG_DIR=/var/log/orc/sensors          # directory for daily CSV files
LOG_ROTATE_DAYS=30                    # delete CSVs older than this
CSV_HEADER=timestamp,temp_c

# ─── Timing ─────────────────────────────────────────────────────────
INTERVAL_SEC=300                      # seconds between readings

# ─── 1-Wire ─────────────────────────────────────────────────────────
# Leave blank to auto-detect the first 28-* device.
# Set explicitly if multiple DS18B20 probes are on the bus.
W1_DEVICE_ID=
