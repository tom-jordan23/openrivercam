# vsftpd config for ORC camera uploads
# Camera pushes video/snapshots via FTP to this server

# Run as standalone daemon on IPv4+IPv6
listen=NO
listen_ipv6=YES

# Authentication
anonymous_enable=NO
local_enable=YES
write_enable=YES

# Chroot camera user to upload directory
chroot_local_user=YES
allow_writeable_chroot=YES

# Only allow users in the userlist
userlist_enable=YES
userlist_file=/etc/vsftpd.userlist
userlist_deny=NO

# File permissions
local_umask=022

# Logging
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log

# Connection settings
connect_from_port_20=YES
use_localtime=YES
dirmessage_enable=YES

# Passive mode for camera behind NAT on camera-net
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40100

# Security
secure_chroot_dir=/var/run/vsftpd/empty
pam_service_name=vsftpd
ssl_enable=NO
