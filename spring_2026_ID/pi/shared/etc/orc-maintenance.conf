# ORC Station Maintenance Mode Configuration
#
# This file configures the remote maintenance mode check.
# The station fetches its mode (production/maintenance) from a GitHub repo
# on every boot. Change MAINTENANCE_REPO to point to your national society's
# control repo.
#
# To create a control repo for a new national society:
#   1. Create a public GitHub repo (e.g., orc-<society>-stations)
#   2. Add station_mode files: pi/<station>/station_mode (content: "production")
#   3. Update this config to point to the new repo
#   4. Give local staff write access to the repo

# GitHub repo in "owner/repo" format
MAINTENANCE_REPO="tom-jordan23/orc-pmi-stations"

# Branch to read from
MAINTENANCE_BRANCH="main"

# Path prefix within the repo (station name is appended automatically)
MAINTENANCE_PATH_PREFIX="pi"
