# ORC Station — Power button behavior
#
# The Pi 5 J2 power button is handled in two layers:
#   1. Short press while running  → RP1 firmware emits KEY_POWER  → logind handles it
#   2. Long press (~5s) while running → RP1 firmware force-cuts power rails (hardware)
#   3. Short press while halted   → RP1 firmware wakes the PMIC (hardware)
#
# This drop-in guarantees layer 1: a clean shutdown on short press, even if the
# base image ships with HandlePowerKey set to "ignore" (some desktop variants do).
# Layer 2 and 3 are firmware and cannot be disabled from Linux.

[Login]
HandlePowerKey=poweroff
HandlePowerKeyLongPress=ignore
