# sensors-upload.conf — remote sensor data upload configuration
#
# Sourced by /usr/local/bin/orc-sensors-upload on every run. Edit
# values here to change upload behavior without modifying the script.
#
# Location: /etc/orc/sensors-upload.conf
#
# The station name is derived from the hostname (orc-<station>) and
# appended to REMOTE_PATH_BASE automatically, so a single config file
# works for both Sukabumi and Jakarta.

# ─── Enable ─────────────────────────────────────────────────────────
# Set to 1 after the SSH key and remote host are provisioned.
ENABLED=0

# ─── Remote host ────────────────────────────────────────────────────
REMOTE_HOST=openrivercam.endlessprojects.info
REMOTE_USER=orc-upload
REMOTE_PATH_BASE=/var/orc/sensors   # /<station>/ is appended by the script
# REMOTE_PORT=2022                  # uncomment if sshd is on a non-standard port

# ─── Authentication ─────────────────────────────────────────────────
# Passphraseless ed25519 key, readable only by the pi user.
SSH_KEY=/home/pi/.ssh/orc-sensors-upload
KNOWN_HOSTS=/home/pi/.ssh/known_hosts

# ─── Source directory ───────────────────────────────────────────────
LOG_DIR=/var/log/orc/sensors

# ─── Watermark ──────────────────────────────────────────────────────
# mtime of this file is the "last successful upload" timestamp.
# Delete to force a full re-upload on the next run.
STATE_FILE=/var/lib/orc-sensors/upload.state

# ─── Network ────────────────────────────────────────────────────────
CONNECT_TIMEOUT=15                  # seconds
