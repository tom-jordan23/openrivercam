# sensors-upload.conf — configuration for orc-sensors-upload
#
# Sourced by /usr/local/bin/orc-sensors-upload. Edit values here to change
# upload behavior without modifying the script itself.
#
# Location: /etc/orc/sensors-upload.conf
#
# The station name is derived from the hostname (orc-<station>) and
# appended to UPLOAD_URL automatically, so this single config works for
# both Sukabumi and Jakarta.

# ─── Enable ─────────────────────────────────────────────────────────
# Set to 1 after UPLOAD_TOKEN is provisioned in ~pi/.orc_deploy_<site>
# AND a smoke test against the server has succeeded.
ENABLED=0

# ─── Endpoint ───────────────────────────────────────────────────────
# Base URL. The script PUTs to:
#   <UPLOAD_URL>/<station>/<filename>
#
# Port 8443 is used because the sensor-upload service terminates TLS
# directly (independent of LiveORC's nginx). Reuses LiveORC's letsencrypt
# cert via volume mount, so the hostname is the same.
UPLOAD_URL=https://openrivercam.endlessprojects.info:8443/sensors/upload

# ─── Authentication ─────────────────────────────────────────────────
# UPLOAD_TOKEN is intentionally NOT stored here. It is loaded from
# ~pi/.orc_deploy_<site> (the same per-site file that holds CAMERA_PASS /
# BASE_PASSWD). Add this line to that file:
#
#   UPLOAD_TOKEN=<long random string from password manager>
#
# Per-site secrets stay out of version control; this shared config stays
# committable.

# ─── Source directory ───────────────────────────────────────────────
LOG_DIR=/var/log/orc/sensors

# ─── Watermark ──────────────────────────────────────────────────────
# mtime of this file is the "last successful upload" timestamp.
# Delete to force a full re-upload on the next run.
STATE_FILE=/var/lib/orc-sensors/upload.state

# ─── Network ────────────────────────────────────────────────────────
CONNECT_TIMEOUT=10        # seconds; TCP-connect timeout per file
MAX_PER_FILE_SECS=20      # seconds; per-file PUT ceiling so a stalled
                          # upload fails fast rather than getting killed
                          # by the wake-cycle shutdown trigger
